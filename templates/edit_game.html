{% extends "base.html" %}
{% block title %}Edit Game - GameVault{% endblock %}

{% block content %}
<div id="toast-container"></div>
<div style="max-width:700px; margin: 0 auto;">

  <h1 style="margin-bottom:20px;">Edit Game</h1>

  <form method="POST" novalidate class="login-card" style="width:100%; text-align:left;">

    <div style="margin-bottom:15px;">
      <label>Playtime (hrs)</label>
      <input type="number" step="any" name="playtime"
             value="{{ game[6] }}" required>
    </div>

    <div style="margin-bottom:15px;">
      <label>Estimated Hours</label>
      <input type="number" step="0.1" name="estimated_hours"
             value="{{ game[10] }}">
    </div>

    <div style="margin-bottom:15px;">
      <label>Achievements Done</label>
      <input type="number" name="achievements_done"
             value="{{ game[7] }}">
    </div>

    <div style="margin-bottom:20px;">
      <label>Total Achievements</label>
      <input type="number" name="achievements_total"
             value="{{ game[8] }}">
    </div>

    <button type="submit" class="gv-btn-primary">
      Save Changes
    </button>

    <a href="/game/{{ game[0] }}">
      <button type="button" class="btn-ghost" style="margin-left:10px;">
        Cancel
      </button>
    </a>

  </form>
</div>
{% endblock %}
